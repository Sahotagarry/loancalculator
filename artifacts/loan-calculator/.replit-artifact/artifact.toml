kind = "web"
previewPath = "/"
title = "Clearline Loan Calculator"
version = "1.0.0"
id = "artifacts/loan-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19360

[services.development]
run = "pnpm --filter @workspace/loan-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loan-calculator", "run", "build" ]
publicDir = "artifacts/loan-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19360"
BASE_PATH = "/"
